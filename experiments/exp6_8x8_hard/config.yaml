# Push the hard-mid 8x8 range, resuming from exp5. exp5 reached 8x8 8 empty 20%,
# 12 empty 7%; this concentrates steps on 6 -> 12 empty to see how far they go.
model: Qwen/Qwen2.5-3B-Instruct
lora_rank: 32
max_seq_length: 4096
gpu_memory_utilization: 0.55
load_in_4bit: true
cot: true
resume_adapter: models/exp5_8x8

learning_rate: 5.0e-6
weight_decay: 0.1
warmup_ratio: 0.03
lr_scheduler_type: cosine
optim: adamw_8bit
beta: 0.04
max_grad_norm: 0.5
num_generations: 8
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
max_prompt_length: 1536
train_temperature: 1.0
logging_steps: 1
seed: 3407

stages:
  - {size: 8, clues: 58, max_steps: 90,  max_completion_length: 1152}   # 6 empty
  - {size: 8, clues: 56, max_steps: 140, max_completion_length: 1152}   # 8
  - {size: 8, clues: 54, max_steps: 170, max_completion_length: 1280}   # 10
  - {size: 8, clues: 52, max_steps: 190, max_completion_length: 1280}   # 12

eval:
  temperature: 0.0
  max_new_tokens: 1280
