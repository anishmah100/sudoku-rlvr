# Push 8x8 into the mid-difficulty range, resuming from the transcription-trained
# adapter (exp4). exp4 reached 8x8 1 empty 61%, 4 empty 9%; this ramps 2 -> 8 empty
# with more steps to see how far mid-8x8 goes. Gentle LR to avoid destabilizing the
# resumed adapter.
model: Qwen/Qwen2.5-3B-Instruct
lora_rank: 32
max_seq_length: 4096
gpu_memory_utilization: 0.55
load_in_4bit: true
cot: true
resume_adapter: models/exp4_8x8

learning_rate: 5.0e-6
weight_decay: 0.1
warmup_ratio: 0.03
lr_scheduler_type: cosine
optim: adamw_8bit
beta: 0.04
max_grad_norm: 0.5
num_generations: 8
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
max_prompt_length: 1536
train_temperature: 1.0
logging_steps: 1
seed: 3407

stages:
  - {size: 8, clues: 62, max_steps: 60,  max_completion_length: 1024}   # 2 empty (reinforce)
  - {size: 8, clues: 61, max_steps: 90,  max_completion_length: 1024}   # 3
  - {size: 8, clues: 60, max_steps: 120, max_completion_length: 1024}   # 4
  - {size: 8, clues: 58, max_steps: 150, max_completion_length: 1152}   # 6
  - {size: 8, clues: 56, max_steps: 170, max_completion_length: 1152}   # 8

eval:
  temperature: 0.0
  max_new_tokens: 1152
