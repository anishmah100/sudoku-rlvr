# 6x6 difficulty curriculum, resuming from the hard-4x4 adapter, which already solves
# 6x6 by transfer (2 empty 29%, 4 empty 17%). Ramp 2 -> 10 empty cells.
model: Qwen/Qwen2.5-3B-Instruct
lora_rank: 32
max_seq_length: 4096
gpu_memory_utilization: 0.55
load_in_4bit: true
cot: true
resume_adapter: models/exp1_4x4_hard

learning_rate: 5.0e-6
weight_decay: 0.1
warmup_ratio: 0.03
lr_scheduler_type: cosine
optim: adamw_8bit
beta: 0.04
max_grad_norm: 0.5
num_generations: 8
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
max_prompt_length: 1024
train_temperature: 1.0
logging_steps: 1
seed: 3407

# 6x6 has 36 cells; clues = 36 - empties.
stages:
  - {size: 6, clues: 34, max_steps: 50,  max_completion_length: 768}    # 2 empty
  - {size: 6, clues: 33, max_steps: 60,  max_completion_length: 768}    # 3
  - {size: 6, clues: 32, max_steps: 80,  max_completion_length: 768}    # 4
  - {size: 6, clues: 30, max_steps: 110, max_completion_length: 768}    # 6
  - {size: 6, clues: 28, max_steps: 140, max_completion_length: 768}    # 8
  - {size: 6, clues: 26, max_steps: 160, max_completion_length: 896}    # 10

eval:
  temperature: 0.0
  max_new_tokens: 896
