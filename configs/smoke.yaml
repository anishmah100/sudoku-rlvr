# Tiny config to validate the train+eval pipeline end-to-end and measure throughput.
model: Qwen/Qwen2.5-3B-Instruct
lora_rank: 32
max_seq_length: 4096
gpu_memory_utilization: 0.6
load_in_4bit: true
learning_rate: 5.0e-6
weight_decay: 0.1
warmup_ratio: 0.0
lr_scheduler_type: constant
optim: adamw_8bit
num_generations: 8
per_device_train_batch_size: 8
gradient_accumulation_steps: 1
max_prompt_length: 1024
train_temperature: 1.0
logging_steps: 1
save_steps: 50
seed: 3407
stages:
  - size: 4
    max_steps: 4
    max_completion_length: 256
eval:
  temperature: 0.0
  max_new_tokens: 256
